<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#030014" rx="20"/>
  
  <!-- UI Layer -->
  <rect x="50" y="50" width="150" height="80" rx="10" fill="#7c3aed" opacity="0.8"/>
  <text x="125" y="95" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold">User / Employer</text>
  
  <path d="M200 90 L300 90" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Cloudflare Functions Layer -->
  <rect x="300" y="40" width="450" height="520" rx="15" fill="none" stroke="#7c3aed" stroke-dasharray="5,5"/>
  <text x="525" y="30" text-anchor="middle" fill="#7c3aed" font-family="Arial" font-size="12">Cloudflare Workers AI (Agent Loop)</text>
  
  <!-- Career Agent -->
  <rect x="350" y="80" width="200" height="100" rx="10" fill="rgba(124, 58, 237, 0.2)" stroke="#7c3aed"/>
  <text x="450" y="130" text-anchor="middle" fill="white" font-family="Arial">Phase 1: Career Agent</text>
  <text x="450" y="150" text-anchor="middle" fill="#a78bfa" font-family="Arial" font-size="10">(Draft Generation)</text>
  
  <path d="M450 180 L450 230" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Self Critic -->
  <rect x="350" y="230" width="200" height="100" rx="10" fill="rgba(124, 58, 237, 0.2)" stroke="#7c3aed"/>
  <text x="450" y="280" text-anchor="middle" fill="white" font-family="Arial">Phase 2: Self-Critic</text>
  <text x="450" y="300" text-anchor="middle" fill="#a78bfa" font-family="Arial" font-size="10">(Scoring & Revision Logic)</text>
  
  <!-- Decisions -->
  <path d="M550 280 L650 280 L650 130 L550 130" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="670" y="200" text-anchor="middle" fill="#7c3aed" font-family="Arial" font-size="10" transform="rotate(90, 670, 200)">Revision Loop if Score &lt; 12</text>
  
  <path d="M450 330 L450 380" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Notifiers -->
  <rect x="350" y="380" width="200" height="100" rx="10" fill="rgba(124, 58, 237, 0.4)" stroke="#7c3aed"/>
  <text x="450" y="430" text-anchor="middle" fill="white" font-family="Arial">Phase 3: Notifiers</text>
  <text x="450" y="450" text-anchor="middle" fill="#a78bfa" font-family="Arial" font-size="10">(Telegram & Google Sheets)</text>
  
  <!-- Final Output -->
  <path d="M350 430 L125 430 L125 130" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="237" y="420" text-anchor="middle" fill="#a78bfa" font-family="Arial" font-size="12">Final Response to UI</text>

  <!-- Markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed" />
    </marker>
  </defs>
</svg>
