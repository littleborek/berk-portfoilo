name: Deploy Static Site to Cloudflare

on:
  push:
    branches: [main]

jobs:
  ci_check: # SÜREKLİ ENTEGRASYON KONTROL JOB'u
    name: Code Validation (HTML, JS, CSS)
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js (Linters için gerekli)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 📦 Configure NPM
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000

      - name: 📦 Install CI Dependencies
        run: npm ci || npm install

      - name: 📦 Install HTML Linter (Global)
        run: npm install -g htmlhint
        
      - name: ✅ Validate HTML Syntax (HTMLHint)
        run: htmlhint public/index.html
        
      - name: 🧹 Run JavaScript Linter (ESLint)
        run: npm run lint:js

      - name: 🎨 Run CSS Linter (Stylelint)
        run: npm run lint:css

  build: # Tailwind Derlemesi ve Optimizasyon
    needs: ci_check
    name: Build and Optimize Assets
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4
        
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Configure NPM
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000

      - name: Install Project Dependencies
        # Hem Tailwind hem de sharp paketlerini kurar
        run: npm ci || npm install
        
      - name: Build All Assets (CSS & Images)
        # Yeni birleşik build komutunu çalıştırır
        run: npm run build 
        
      - name: Save Built Assets (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: public/dist


  deploy: # CD JOB'u (Artık Build'e Bağımlı)
    needs: build
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # GÜNCELLENDİ: v3 yerine v4 kullanılıyor
      - name: Download Build Artifacts (dist)
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: public/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          directory: "public"
          wranglerVersion: "4"